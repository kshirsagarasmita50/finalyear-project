<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Multimodel Fake News Detection</title>

    <style>
        body 
        {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        /* Header */
        .header 
        {
            background: #b30000;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        /* Layout */
        .container 
        {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #0f172a;
            min-height: 100vh;
            color: white;
            padding-top: 20px;
        }

        .sidebar h2 
        {
            text-align: center;
            margin-bottom: 20px;
        }

        .sidebar a 
        {
            display: block;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover
         {
            background: #1e293b;
        }

        /* Content */
        .content {
            flex: 1;
            padding: 30px;
        }

        textarea 
        {
            width: 100%;
            height: 120px;
            padding: 10px;
            font-size: 16px;
        }

        button 
        {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            background: #b30000;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover 
        {
            background: #8b0000;
        }

        .result
         {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .real
         {
            color: green;
        }

        .fake
         {
            color: red;
        }
    </style>
</head>

<body>

<div class="header">
     Multimodel Fake News Detection .
</div>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>AI Verify</h2>
        <a href="/home">🏠 Home</a>
        <a href="/text-news">📰 Text News</a>
        <a href="#">🖼 Image News</a>
        <a href="/">🚪 Logout</a>
    </div>

    <!-- Main Content -->
    <div class="content">
        <h2>Check News Text</h2>

        <textarea id="newsText" placeholder="Enter news text here..."></textarea>
        <br>
        <button onclick="checkNews()">Check News</button>

        <div class="result" id="result"></div>
    </div>

</div>

<script>
function checkNews() {
    let text = document.getElementById("newsText").value.trim();

    if (text.length < 20) {
        alert("Please enter proper news content (minimum 20 characters)");
        return;
    }

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
    })
    .then(response => response.json())
    .then(data => {
        let resultDiv = document.getElementById("result");

        if (data.prediction === "REAL") {
            resultDiv.innerHTML =
                "✅ REAL NEWS<br>Confidence: " + data.confidence + "%";
            resultDiv.className = "result real";
        } else {
            resultDiv.innerHTML =
                "❌ FAKE NEWS<br>Confidence: " + data.confidence + "%";
            resultDiv.className = "result fake";
        }
    });
}
</script>


</body>
</html>
