<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multimodel Fake News Detection</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}
.container {
  height: 100vh;
  display: flex;
}
.left {
  width: 55%;
  padding: 80px;
}
.left h1 {
  font-size: 48px;
}
.left p {
  font-size: 20px;
  color: #cbd5e1;
}
.right {
  width: 45%;
  display: flex;
  justify-content: center;
  align-items: center;
}
.card {
  background: #020617;
  padding: 30px;
  width: 360px;
  border-radius: 10px;
}
input {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 6px;
  border: none;
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  background: #22c55e;
  border: none;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  border-radius: 6px;
}
button:hover {
  background: #16a34a;
}
.rules {
  font-size: 13px;
  color: #94a3b8;
  margin-top: 10px;
}
.footer {
  text-align: center;
  font-size: 13px;
  color: #94a3b8;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

  <div class="left">
    <h1>Learn & Verify News</h1>
    <p>
      Fake News Detection System using AI & Machine Learning.  
      Analyze Text and Images instantly.
    </p>
  </div>

  <div class="right">
    <form class="card" method="POST" action="/login">
      <form method="POST" action="/login">

      <h2>Sign In</h2>

      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>

      <div class="rules">
        Password must contain:
        <ul>
          <li>At least 8 characters</li>
          <li>1 Uppercase letter</li>
          <li>1 Lowercase letter</li>
          <li>1 Number</li>
          <li>1 Special character (@ # $ %)</li>
        </ul>
      </div>

      <button>Login</button>

      <div class="footer">Final Year Diploma Project</div>
    </form>
  </div>

</div>

</body>
</html>
